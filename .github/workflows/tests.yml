name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Run unit tests
        run: swift test --filter "WAVParsingSecurityTests|DownloadSecurityTests|MetallibScriptTests"
